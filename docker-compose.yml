services:
  architect-mcp:
    build: .
    container_name: architect-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      ARCHITECT_MCP_HTTP: "1"
      ARCHITECT_MCP_HTTP_PORT: "3003"
      ARCHITECT_DASHBOARD_PORT: "3001"
    volumes:
      - ./custom_tools:/app/custom_tools
      - ./data:/app/data
      - ./marketplace:/app/marketplace
    expose:
      - "3001"
      - "3002"
      - "3003"
    networks:
      - architect_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 2g
    cpus: "2.0"

  caddy:
    image: caddy:2.10-alpine
    container_name: architect-caddy
    restart: unless-stopped
    depends_on:
      architect-mcp:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - architect_net

networks:
  architect_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
